name: Simulations

on:
  push:

permissions:
  contents: read

jobs:
  sim-all:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install simulation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential make verilator

      - name: Run all simulations
        run: make sim_all

      - name: Upload VCD waveforms
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcd-waveforms
          path: "**/*.vcd"
          if-no-files-found: error
